services:
  mysql:
    image: mysql:8.0
    container_name: shieldgate-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shieldgate
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: shieldgate-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: shieldgate-backend
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"

  frontend:
    build: ./shieldgate-frontend
    container_name: shieldgate-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data: